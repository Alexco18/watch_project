<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ChronoBase – Montres</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--gold-gradient:linear-gradient(90deg,#d4af37,#f5d98c,#c8a951);--bg-main:radial-gradient(circle at top,#1a1a1a 0%,#0b0b0b 60%,#000 100%);--bg-header:#0b0b0b;--bg-card:linear-gradient(180deg,#111,#0c0c0c);--bg-footer:#0b0b0b;--text-main:#d4af37;--text-secondary:#c1a96b;--border-color:rgba(212,175,55,0.2)}.light-theme{--bg-main:#ffffff;--bg-header:#ffffff;--bg-card:#ffffff;--bg-footer:#ffffff;--text-main:#000000;--text-secondary:#444444;--border-color:rgba(0,0,0,0.2)}body{margin:0;padding:0;font-family:'Montserrat',sans-serif;background:var(--bg-main);color:var(--text-main);font-weight:300;overflow-x:hidden;scroll-behavior:smooth}.gold-text{background:var(--gold-gradient);-webkit-background-clip:text;color:transparent;animation:shine 6s infinite linear;background-size:200%}

/* Nouveau Style Header */
header {
    width: 100%;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-header);
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
}
.header-container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 15px;
}
nav a {
    margin-left: 30px;
    text-decoration: none;
    color: var(--text-main);
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
}
nav a:hover { color: #f5d98c; }
.nav-active { font-weight: 700; border-bottom: none; }

/* Switches Logic */
#theme-switch, #lang-switch {
    width: 50px;
    height: 26px;
    background: var(--border-color);
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    display: flex;
    align-items: center;
    padding: 3px;
    user-select: none;
}
.switch-handle {
    width: 20px;
    height: 20px;
    background: var(--text-main);
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    font-weight: bold;
    color: var(--bg-header);
}
.light-theme #theme-switch .switch-handle { transform: translateX(24px); background: #000; }
#lang-switch .switch-handle { transform: translateX(0); }
body.lang-en #lang-switch .switch-handle { transform: translateX(24px); }

/* Reste des styles existants */
#filters{max-width:1200px;margin:140px auto 20px;display:flex;gap:20px;justify-content:center}select{padding:10px 15px;border-radius:8px;background:var(--bg-card);color:var(--text-main);border:1px solid var(--border-color)}#search-container{max-width:1200px;margin:20px auto 0;padding:0 20px;display:flex;justify-content:center}#search-input{width:100%;max-width:600px;padding:12px 20px;border-radius:25px;background:var(--bg-card);color:var(--text-main);border:1px solid var(--border-color);font-family:'Montserrat',sans-serif;font-size:16px;outline:none;transition:border-color 0.3s}#search-input:focus{border-color:#f5d98c;box-shadow:0 0 10px rgba(212,175,55,0.2)}.watch-grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:30px;padding:20px 20px 80px}.watch-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px;cursor:pointer;transition:0.2s;display:flex;flex-direction:column;height:100%}.watch-card:hover{transform:scale(1.03)}.watch-card img{width:100%;height:200px;object-fit:cover;border-radius:8px}.watch-card p{margin-top:auto}

/* STYLE DU BOUTON REMONTER (Mis à jour) */
#back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 45px;
    height: 45px;
    background: var(--bg-card);
    border: 1px solid var(--text-main);
    color: var(--text-main);
    border-radius: 50%;
    cursor: pointer;
    display: none; /* Caché par défaut */
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: .3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    font-size: 18px;
}
#back-to-top:hover {
    background: var(--text-main);
    color: var(--bg-header);
    transform: translateY(-5px);
}
</style>
</head>
<body class="lang-fr">

<header>
    <div class="header-container">
        <div class="header-left">
            <h2 class="gold-text">ChronoBase</h2>
            <div id="theme-switch" onclick="toggleTheme()">
                <div class="switch-handle"></div>
            </div>
            <div id="lang-switch" onclick="toggleLang()">
                <div class="switch-handle" id="lang-label">FR</div>
            </div>
        </div>
        <nav id="main-nav">
            <a href="index.html" data-key="nav-home">Accueil</a>
            <a href="montre.html" data-key="nav-watches" class="nav-active">Les montres</a>
            <a href="atelier.html" data-key="nav-workshop">L'atelier</a>
            <a href="ressources.html" data-key="nav-res">Ressources</a>
            <a href="propos.html" data-key="nav-about">À propos</a>
        </nav>
    </div>
</header>

<h1 class="gold-text" style="text-align:center;margin-top:120px">Toutes les montres</h1>
<div id="search-container"><input type="text" id="search-input" placeholder="Rechercher un modèle, une marque (ex: Himalaya, Submariner...)" autocomplete="off"></div>
<div id="filters"><select id="brand-filter"><option value="all">Toutes les marques</option></select><select id="sort-filter"><option value="none">Tri : Aucun</option><option value="year-asc">Année : plus ancienne → plus récente</option><option value="year-desc">Année : plus récente → plus ancienne</option><option value="brand-az">Marque : A → Z</option><option value="brand-za">Marque : Z → A</option></select><select id="limit-filter"><option value="10">Afficher 10</option><option value="25" selected>Afficher 25</option><option value="50">Afficher 50</option></select></div>
<div class="watch-grid" id="watch-grid"></div>

<button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

<script>
    const translations = {
        fr: {
            "nav-home": "Accueil",
            "nav-watches": "Les montres",
            "nav-workshop": "L'atelier",
            "nav-res": "Ressources",
            "nav-about": "À propos"
        },
        en: {
            "nav-home": "Home",
            "nav-watches": "Watches",
            "nav-workshop": "Workshop",
            "nav-res": "Resources",
            "nav-about": "About"
        }
    };

    function toggleLang() {
        const body = document.body;
        const label = document.getElementById("lang-label");
        const isFr = body.classList.contains("lang-fr");
        const newLang = isFr ? "en" : "fr";

        body.classList.remove("lang-fr", "lang-en");
        body.classList.add("lang-" + newLang);
        label.textContent = newLang.toUpperCase();
        
        localStorage.setItem("lang", newLang);
        applyTranslations(newLang);
    }

    function applyTranslations(lang) {
        document.querySelectorAll("[data-key]").forEach(el => {
            const key = el.getAttribute("data-key");
            if (translations[lang] && translations[lang][key]) {
                el.textContent = translations[lang][key];
            }
        });
    }

    function toggleTheme() {
        document.body.classList.toggle("light-theme");
        const isLight = document.body.classList.contains("light-theme");
        localStorage.setItem("theme", isLight ? "light" : "dark");
    }

    // Chargement préférences
    (function(){
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme === "light") document.body.classList.add("light-theme");
        
        const savedLang = localStorage.getItem("lang") || "fr";
        document.body.classList.remove("lang-fr", "lang-en");
        document.body.classList.add("lang-" + savedLang);
        document.getElementById("lang-label").textContent = savedLang.toUpperCase();
        applyTranslations(savedLang);
    })();

    // GESTION DU BOUTON REMONTER (Apparition au scroll)
    window.onscroll = function() {
        const btn = document.getElementById("back-to-top");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "flex";
        } else {
            btn.style.display = "none";
        }
    };
</script>

<script>window.WATCHES=[];</script>
<script src="brands/lip.js"></script><script src="brands/rolex.js"></script><script src="brands/swatch.js"></script><script src="brands/omega.js"></script><script src="brands/yema.js"></script><script src="brands/tissot.js"></script><script src="brands/orient.js"></script><script src="brands/longines.js"></script><script src="brands/iwc.js"></script><script src="brands/breitling.js"></script>
<script src="js/filters.js"></script><script src="js/ui-watches.js"></script>
<script>
function init(){populateBrandFilter(window.WATCHES);applyFilters();}
document.getElementById("brand-filter").addEventListener("change",applyFilters);document.getElementById("sort-filter").addEventListener("change",applyFilters);document.getElementById("limit-filter").addEventListener("change",applyFilters);document.getElementById("search-input").addEventListener("input",applyFilters);
function applyFilters(){let list=[...window.WATCHES];const brand=document.getElementById("brand-filter").value;const sort=document.getElementById("sort-filter").value;const limit=parseInt(document.getElementById("limit-filter").value);const searchQuery=document.getElementById("search-input").value.toLowerCase();if(searchQuery!==""){list=list.filter(watch=>{const name=watch.name?watch.name.toLowerCase():"";const brandName=watch.brand?watch.brand.toLowerCase():"";return name.includes(searchQuery)||brandName.includes(searchQuery);});}if(brand!=="all")list=filterByBrand(brand,list);if(sort==="year-asc")list=sortByYearAsc(list);if(sort==="year-desc")list=sortByYearDesc(list);if(sort==="brand-az")list=sortByBrandAZ(list);if(sort==="brand-za")list=sortByBrandZA(list);const limitedList=list.slice(0,limit);displayWatches(limitedList);}init();
</script>
</body>
</html>
